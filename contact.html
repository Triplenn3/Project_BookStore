<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>book Store</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contact.css" />
  </head>
  <body>
    <header>
      <input type="checkbox" name="" id="toggler" />
      <label for="toggler" class="fas fa-bars"></label>
      <a href="#" class="logo">Book Store<span>.</span></a>
      <nav class="navbar">
        <a href="home.html">Home</a>
        <a href="about.html">about</a>
        <a href="book.html">books</a>
        <a href="contact.html">contact</a>

      <div class="icons">
        <a href="#" class="fas fa-heart"></a>
        <a href="#" class="fas fa-shopping-cart"></a>
        <a href="#" class="fas fa-user"></a>
      </div>
    </header>
    <section class="contact" id="contact">
      <h1 class="heading"><span> contact </span> us</h1>

      <div class="row">
        <form action="">
          <input type="text" placeholder="name" class="box" />
          <input type="email" placeholder="email" class="box" />
          <input type="number" placeholder="number" class="box" />
          <textarea
            name=""
            class="box"
            placeholder="message"
            id=""
            cols="30"
            rows="10"
          ></textarea>
          <input type="submit" value="send message" class="btn" />
        </form>

        <div class="image">
          <img src="image/snoopy.jpg" alt="" />
        </div>
      </div>
    </section>

    <section class="footer">
      <div class="box-container">
        <div class="box">
          <h3>quick Links</h3>
          <a href="home.html">home</a>
          <a href="about.html">about</a>
          <a href="book.html">book</a>
          <a href="contact.html">contact</a>
        </div>

        <div class="box">
          <h3>extra Links</h3>
          <a href="#">my account</a>
          <a href="#">my order</a>
          <a href="#">my favorite</a>
        </div>

        <div class="box">
          <h3>location</h3>
          <a href="#">USA</a>
          <a href="#">JAPAN</a>
          <a href="#">France</a>
          <a href="#">Italy</a>

        <div class="box">
          <h3>contact info</h3>
          <a href="#">+855-965-372-326</a>
          <a href="#">phairanuth168@gmail.com</a>
          <a href="#">Phnom Penh, Kouk Roka, 2004</a>

        created by <span>Phai Ranuth</span> | all rights reserved!
      </div>
